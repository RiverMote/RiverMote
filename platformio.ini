; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env]
platform = espressif32
board = esp32s3box
framework = arduino
extra_scripts = scripts/patch_lib.py
lib_deps = 
	milesburton/DallasTemperature@^4.0.6
	dfrobot/DFRobot_EnvironmentalSensor@^1.1
	sparkfun/SparkFun 9DoF IMU Breakout - ICM 20948 - Arduino Library@^1.3.2
	vshymanskyy/StreamDebugger@^1.0.1
	vshymanskyy/TinyGSM@^0.12.0
	lewisxhe/XPowersLib@^0.3.3
build_flags = 
	-DBOARD_HAS_PSRAM
	-DICM_20948_USE_DMP
	-DXPOWERS_CHIP_AXP2101
	-DTINY_GSM_MODEM_SIM7080
	-DTINY_GSM_RX_BUFFER=1024
board_upload.flash_size = 16MB
upload_speed = 921600
monitor_speed = 115200

[env:rivermote]
lib_deps = 
	${env.lib_deps}
	h2zero/NimBLE-Arduino@^2.5.0
	br3ttb/PID@^1.2.1
	sparkfun/SparkFun AS726X@^2.0.1
build_flags = 
	${env.build_flags}
	-DRIVERMOTE
	-DCONFIG_BT_BLE_50_FEATURES_SUPPORTED
board_build.partitions = huge_app.csv

[env:minimote]
lib_deps = 
	${env.lib_deps}
	arduino-libraries/ArduinoHttpClient@^0.6.1
	bblanchon/ArduinoJson@^7.2.2
	knolleary/PubSubClient@^2.8
	sparkfun/SparkFun BMV080 Arduino Library@^1.0.4
	sparkfun/SparkFun High Precision Temperature Sensor TMP117 Qwiic@^1.2.5
build_flags = 
	${env.build_flags}
	-DMINIMOTE
	-DCONFIG_PM_ENABLE
board_build.partitions = default_16MB.csv

[env:minimote_ci]
extends = env:minimote
lib_ignore = 
	SparkFun BMV080 Arduino Library
build_flags = 
	${env:minimote.build_flags}
	-DNO_BMV080
